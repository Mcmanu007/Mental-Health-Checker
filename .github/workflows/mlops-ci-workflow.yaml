name: Mental CI

on:
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Data Ingestion
      run: |
        python src/data_modelling/data_ingestion.py \
          --config config.yaml
    
    - name: Run Data Preprocessing
      run: |
        python src/data_modelling/data_preprocess.py \
          --config config.yaml

    - name: Run Model Building
      run: |
        python src/mod/model_build.py \
          --config config.yaml
    
    - name: Set up MLflow Tracking Server
      run: |
        docker pull ghcr.io/mlflow/mlflow:latest
        docker run -d -p 5555:5000 --name mlflow-server ghcr.io/mlflow/mlflow:latest \
          mlflow server --host 0.0.0.0 \
          --backend-store-uri sqlite:///mlflow.db \
          --default-artifact-root /tmp/mlruns
      
    - name: Run Model Evaluation
      run: |
        python src/mod/model_evaluation.py \
          --config config.yaml
          --mlflow-tracking-uri http://localhost:5555
    
    - name: Cleanup MLflow Tracking Server 
      run: |
        docker stop mlflow-server
        docker rm mlflow-server
        docker rmi ghcr.io/mlflow/mlflow:latest
      
        

  